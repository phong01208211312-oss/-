<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語進階：開學了 Combo 挑戰賽</title>
    <style>
        :root {
            --edu-blue: #4A90E2; --edu-yellow: #FFD200; --edu-red: #FF5A5F;
            --edu-green: #7ED321; --text-dark: #333;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #EBF2F6; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 750px; background: white; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden; position: relative; }
        .banner { width: 100%; height: 180px; background: url('https://study.mdnkids.com/CH/images/main.jpg') center/cover; border-bottom: 6px solid var(--edu-yellow); }
        .score-panel { position: absolute; top: 10px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 50px; border: 2px solid var(--edu-blue); font-weight: bold; z-index: 10; }
        .combo-badge { color: var(--edu-red); font-size: 1.2rem; display: block; text-align: right; }
        .content { padding: 30px; text-align: center; min-height: 420px; }
        .hidden { display: none; }
        .sentence-display { font-size: 1.4rem; margin: 20px 0; padding: 20px; background: #F0F7FF; border-radius: 15px; border-left: 8px solid var(--edu-blue); position: relative; }
        .audio-btn { cursor: pointer; color: var(--edu-blue); margin-left: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 12px; border: 2px solid var(--edu-blue); background: white; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; color: var(--edu-blue); }
        .btn:hover:not(:disabled) { background: var(--edu-blue); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .word-tile { padding: 10px 15px; background: var(--edu-yellow); border-radius: 8px; cursor: pointer; margin: 5px; display: inline-block; font-weight: bold; }
        .sort-zone { min-height: 60px; border: 3px dashed var(--edu-blue); margin: 15px 0; padding: 10px; border-radius: 15px; background: #FFFDF0; }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: bold; }
        .correct { background: #E8F5E9; color: #2E7D32; border: 2px solid #A5D6A7; animation: bounce 0.5s; }
        .wrong { background: #FFEBEE; color: #C62828; border: 2px solid #EF9A9A; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .combo-text { color: var(--edu-red); font-weight: 900; font-size: 1.5rem; position: absolute; width: 100%; top: -30px; left: 0; pointer-events: none; opacity: 0; transition: 0.5s; }
        .show-combo { opacity: 1; top: -50px; }
    </style>
</head>
<body>

<div id="app">
    <div class="banner"></div>
    <div class="score-panel">
        <div>總分: <span id="total-score">0</span></div>
        <div class="combo-badge" id="combo-ui">Combo x0</div>
    </div>
    
    <div id="start-screen" class="content">
        <h2 style="color: var(--edu-blue);">🚀 連鎖答題大挑戰</h2>
        <p>連續答對題目，獲得的分數會越來越高！<br>答錯一次，連鎖就會中斷喔。</p>
        <button class="btn" style="background: var(--edu-blue); color: white; padding: 15px 40px;" onclick="initGame()">開始挑戰</button>
    </div>

    <div id="game-screen" class="content hidden">
        <div id="combo-anim" class="combo-text">COMBO UP!</div>
        <div class="sentence-display">
            <span id="q-text"></span>
            <span class="audio-btn" onclick="replayQ()">🔊</span>
        </div>
        <div id="interactive-area"></div>
        <div id="feedback" class="hidden"></div>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()" style="margin-top:20px; width:100%; background:var(--edu-green); color:white; border:none;">下一題</button>
    </div>

    <div id="end-screen" class="content hidden">
        <h2>🎊 挑戰結束</h2>
        <div style="font-size: 2.5rem; margin: 20px 0; color: var(--edu-blue);" id="final-score"></div>
        <button class="btn" onclick="location.reload()">再試一次</button>
    </div>
</div>

<script>
    const questions = [
        { type: 'choice', q: '他每天都在圖書館讀書，非常____。', options: ['原來', '用功', '反對', '嚴'], ans: 1, cite: '頁面 2' },
        { type: 'choice', q: '爸爸____我晚上太晚回家。', options: ['原來', '反對', '用功', '累'], ans: 1, cite: '頁面 16' },
        { type: 'choice', q: '台北的天氣真奇怪，說下雨____下雨。', options: ['都', '就', '也', '還'], ans: 1, cite: '頁面 6' },
        { type: 'sort', q: '重組：(奶茶店)', words: ['說買', '就買', '每次經過', '奶茶店'], ans: '每次經過奶茶店說買就買', cite: '頁面 6' },
        { type: 'choice', q: '參觀這個博物館，不管____，都要買票。', options: ['誰想去', '什麼人', '哪裡好玩', '想不想買'], ans: 1, cite: '頁面 14' },
        { type: 'choice', q: '李老師很嚴，常常說考試____考試。', options: ['都', '就', '也', '又'], ans: 1, cite: '頁面 9' },
        { type: 'choice', q: '我原來在____工作，現在搬來台北了。', options: ['美國', '照相', '用功', '不管'], ans: 0, cite: '頁面 4' },
        { type: 'choice', q: '天氣冷的時候，____吃火鍋____吃火鍋。', options: ['說...就...', '不管...都...', '因為...所以...', '雖然...但是...'], ans: 0, cite: '頁面 8' },
        { type: 'sort', q: '重組：(學習態度)', words: ['不管', '累不累', '她', '都會來', '上課'], ans: '不管累不累她都會來上課', cite: '頁面 15' },
        { type: 'choice', q: '不管天氣____，我都要去海邊。', options: ['好不好', '怎麼樣', '好還是壞', '以上皆可'], ans: 3, cite: '頁面 12' },
        { type: 'choice', q: '你的中文真好，____你學中文有十年了！', options: ['原來', '反對', '用功', '不管'], ans: 0, cite: '頁面 16' },
        { type: 'sort', q: '重組：(買衣服)', words: ['看到', '喜歡的衣服', '說買', '就買'], ans: '看到喜歡的衣服說買就買', cite: '頁面 7' },
        { type: 'choice', q: '他很用功，不管____，他都拿第一名。', options: ['什麼考試', '誰在說話', '哪裡好玩', '什麼時候'], ans: 0, cite: '頁面 11' },
        { type: 'choice', q: '____你會照相！我以前不知道。', options: ['反對', '用功', '原來', '不管'], ans: 2, cite: '頁面 4' },
        { type: 'choice', q: '我反對老師每天都____。', options: ['買衣服', '筆試/口試', '去海邊', '學中文'], ans: 1, cite: '頁面 3' }
    ];

    let currentQ = 0, score = 0, combo = 0, attempts = 0, userSort = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playScoreSound(comboCount) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const freq = 440 + (comboCount * 100); 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function replayQ() { speak(questions[currentQ].type === 'choice' ? questions[currentQ].q : '請將詞彙排列正確。'); }
    function speak(txt) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(txt); m.lang = 'zh-TW'; window.speechSynthesis.speak(m); }

    function initGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ], interactive = document.getElementById('interactive-area'), fb = document.getElementById('feedback');
        attempts = 0; userSort = [];
        document.getElementById('q-text').innerText = q.q;
        interactive.innerHTML = ''; fb.className = 'hidden';
        document.getElementById('next-btn').classList.add('hidden');

        if(q.type === 'choice') {
            const grid = document.createElement('div'); grid.className = 'options-grid';
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = opt;
                b.onclick = () => checkAns(idx, b); grid.appendChild(b);
            });
            interactive.appendChild(grid);
        } else {
            const zone = document.createElement('div'); zone.className = 'sort-zone'; zone.id = 'sort-zone';
            interactive.appendChild(zone);
            const pool = document.createElement('div');
            [...q.words].sort(() => Math.random() - 0.5).forEach(w => {
                const t = document.createElement('div'); t.className = 'word-tile'; t.innerText = w;
                t.onclick = () => { userSort.push(w); updateSortDisplay(); }; pool.appendChild(t);
            });
            interactive.appendChild(pool);
            const cBtn = document.createElement('button'); cBtn.className = 'btn'; cBtn.style.marginTop = '20px'; cBtn.innerText = '✅ 檢查答案';
            cBtn.onclick = checkSort; interactive.appendChild(cBtn);
        }
        replayQ();
    }

    function updateSortDisplay() {
        const zone = document.getElementById('sort-zone'); zone.innerHTML = '';
        userSort.forEach((w, i) => {
            const t = document.createElement('div'); t.className = 'word-tile';
            t.style.background = 'var(--edu-blue)'; t.style.color = 'white'; t.innerText = w;
            t.onclick = () => { userSort.splice(i,1); updateSortDisplay(); }; zone.appendChild(t);
        });
    }

    function checkAns(idx, btn) {
        const q = questions[currentQ];
        if(idx === q.ans) { handleResult(true); }
        else {
            attempts++; btn.disabled = true;
            if(attempts >= 2) handleResult(false, `答案是：${q.options[q.ans]}`);
            else showHint("答錯囉，剩 1 次機會！");
        }
    }

    function checkSort() {
        const q = questions[currentQ];
        if(userSort.join('') === q.ans) handleResult(true);
        else {
            attempts++;
            if(attempts >= 2) handleResult(false, `順序是：${q.ans}`);
            else showHint("順序不對，再試一次！");
        }
    }

    function handleResult(isCorrect, msg = "") {
        const fb = document.getElementById('feedback');
        fb.classList.remove('hidden');
        if(isCorrect) {
            combo++;
            const addScore = combo * 100;
            score += addScore;
            fb.innerHTML = `正確！加 ${addScore} 分！🔥<br><small>${questions[currentQ].cite}</small>`;
            fb.className = 'correct';
            playScoreSound(combo);
            triggerComboAnim(combo);
        } else {
            combo = 0;
            fb.innerHTML = `失敗！連鎖中斷。❌ ${msg}<br><small>${questions[currentQ].cite}</small>`;
            fb.className = 'wrong';
        }
        updateUI();
        endStep();
    }

    function showHint(txt) {
        const fb = document.getElementById('feedback');
        fb.innerText = txt; fb.className = 'wrong'; fb.classList.remove('hidden');
    }

    function triggerComboAnim(c) {
        const anim = document.getElementById('combo-anim');
        anim.innerText = `COMBO X${c} UP!`;
        anim.classList.add('show-combo');
        setTimeout(() => anim.classList.remove('show-combo'), 800);
    }

    function updateUI() {
        document.getElementById('total-score').innerText = score;
        document.getElementById('combo-ui').innerText = `Combo x${combo}`;
    }

    function endStep() {
        document.getElementById('next-btn').classList.remove('hidden');
        const btns = document.querySelectorAll('.btn'); btns.forEach(b => { if(b.id !== 'next-btn') b.disabled = true; });
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) showQuestion();
        else showEnd();
    }

    function showEnd() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `總得分：${score}`;
    }
</script>
</body>
</html>
