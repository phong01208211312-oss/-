<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語數位學習：第一課 開學了</title>
    <style>
        :root {
            --edu-blue: #4A90E2; --edu-yellow: #FFD200; --edu-red: #FF5A5F;
            --edu-green: #7ED321; --text-dark: #333;
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: #EBF2F6; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; 
        }
        #app { 
            width: 100%; max-width: 750px; background: white; border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden; 
        }
        /* 圖片頁首 */
        .banner {
            width: 100%; height: 200px;
            background-image: url('https://study.mdnkids.com/CH/images/main.jpg');
            background-size: cover; background-position: center;
            border-bottom: 6px solid var(--edu-yellow);
        }
        .header { background: white; padding: 15px; text-align: center; color: var(--edu-blue); }
        .audio-btn { 
            cursor: pointer; font-size: 1.6rem; vertical-align: middle; 
            margin-left: 8px; transition: transform 0.2s; display: inline-block; color: var(--edu-blue);
        }
        .audio-btn:hover { transform: scale(1.2); }
        .progress-bar { height: 10px; background: #eee; width: 100%; }
        #progress-fill { height: 100%; background: var(--edu-green); width: 0%; transition: 0.5s ease; }
        
        .content { padding: 30px; text-align: center; min-height: 400px; }
        .hidden { display: none; }
        .sentence-display { 
            font-size: 1.4rem; margin: 25px 0; padding: 20px; 
            background: #F0F7FF; border-radius: 15px; border-left: 8px solid var(--edu-blue);
            line-height: 1.6;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { 
            padding: 15px; border: 2px solid var(--edu-blue); background: white; 
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            color: var(--edu-blue); transition: 0.2s; 
        }
        .btn:hover:not(:disabled) { background: var(--edu-blue); color: white; box-shadow: 0 4px 10px rgba(74,144,226,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #ccc; color: #999; }
        
        .word-tile { 
            padding: 12px 18px; background: var(--edu-yellow); border-radius: 8px; 
            cursor: pointer; margin: 6px; display: inline-block; font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
        }
        .sort-zone { min-height: 70px; border: 3px dashed var(--edu-blue); margin: 20px 0; padding: 15px; border-radius: 15px; background: #FFF; }
        
        #feedback { margin-top: 20px; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; }
        .correct { background: #E8F5E9; color: #2E7D32; border: 2px solid #A5D6A7; }
        .wrong { background: #FFEBEE; color: #C62828; border: 2px solid #EF9A9A; }
        .cite-tag { font-size: 0.9rem; color: #555; display: block; margin-top: 10px; font-weight: normal; font-style: italic; }
        .hint-text { color: var(--edu-red); font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="banner"></div>
    <div class="header">
        <h2 style="margin:0">第一課：開學了 <span class="audio-btn" title="聽發音" onclick="replayQ()">🔊</span></h2>
    </div>
    <div id="progress-container" class="progress-bar hidden"><div id="progress-fill"></div></div>

    <div id="start-screen" class="content">
        <h2 style="color: var(--edu-blue); font-size: 1.8rem;">🎒 歡迎來到開學挑戰賽</h2>
        <p style="font-size: 1.1rem; color: #666;">點擊 🔊 聽發音，答對即得分！<br>每題有兩次機會，錯兩次會告訴你正確答案喔。</p>
        <button class="btn" style="background: var(--edu-blue); color: white; padding: 18px 50px; font-size:1.3rem; margin-top: 20px;" onclick="initGame()">開始學習挑戰</button>
    </div>

    <div id="game-screen" class="content hidden">
        <div id="attempt-hint" class="hint-text"></div>
        <div class="sentence-display">
            <span id="q-text"></span>
            <span class="audio-btn" style="font-size:1.2rem" onclick="replayQ()">🔊</span>
        </div>
        <div id="interactive-area"></div>
        <div id="feedback" class="hidden"></div>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()" style="margin-top:25px; width: 100%; background: var(--edu-green); color: white; border: none; font-size: 1.2rem;">繼續下一題</button>
    </div>

    <div id="end-screen" class="content hidden">
        <h2 style="color: var(--edu-blue);">🎊 挑戰大成功！</h2>
        <div id="score-display" style="font-size: 2.5rem; margin: 30px 0; color: var(--edu-green); font-weight: bold;"></div>
        <p id="final-stats" style="font-size: 1.2rem;"></p>
        <button class="btn" style="margin-top: 20px;" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const questions = [
        { type: 'choice', q: '他每天都在圖書館讀書，非常____。', options: ['原來', '用功', '反對'], ans: 1, cite: '頁面 2：[生詞] 他很用功念書。' },
        { type: 'choice', q: '爸爸____我晚上太晚回家。', options: ['原來', '反對', '用功'], ans: 1, cite: '頁面 16：[練習] 爸爸反對我太晚回家。' },
        { type: 'choice', q: '你的中文真好，____你學中文有十年了！', options: ['原來', '反對', '用功'], ans: 0, cite: '頁面 4：[生詞] 原來你會照相。' },
        { type: 'choice', q: '台北的天氣真奇怪，說下雨____下雨。', options: ['都', '就', '也'], ans: 1, cite: '頁面 6：[語法] 台北的天氣說下雨就下雨。' },
        { type: 'sort', q: '請重組句子：(奶茶店)', words: ['說買', '就買', '每次經過', '奶茶店'], ans: '每次經過奶茶店說買就買', cite: '頁面 6：[語法] 說買就買。' },
        { type: 'choice', q: '李老師很嚴，常常說考試____考試。', options: ['都', '就', '再'], ans: 1, cite: '頁面 9：[語法] 常常說考試就考試。' },
        { type: 'choice', q: '天氣冷的時候，____吃火鍋____吃火鍋。', options: ['說...就...', '不管...都...', '因為...所以...'], ans: 0, cite: '頁面 8：[練習] 說吃火鍋就吃火鍋。' },
        { type: 'choice', q: '參觀這個博物館，不管____，都要買票。', options: ['誰', '什麼人', '哪裡'], ans: 1, cite: '頁面 14：[練習] 不管什麼人都要買票。' },
        { type: 'sort', q: '請重組句子：(學習態度)', words: ['不管', '累不累', '她', '都會來', '上課'], ans: '不管累不累她都會來上課', cite: '頁面 15：[練習] 不管累不累都會來上課。' },
        { type: 'choice', q: '不管天氣____，我都要去海邊。', options: ['好不好', '怎麼樣', '以上皆可'], ans: 2, cite: '頁面 12：[語法] 不管天氣怎麼樣/好不好。' },
        { type: 'choice', q: '我原來在____工作。', options: ['美國', '台北', '圖書館'], ans: 0, cite: '頁面 4：[生詞] 我原來在美國工作。' },
        { type: 'sort', q: '請重組句子：(購物習慣)', words: ['看到', '喜歡的衣服', '說買', '就買'], ans: '看到喜歡的衣服說買就買', cite: '頁面 7：[語法] 說買就買。' },
        { type: 'choice', q: '他很用功念書，不管____，他都拿第一名。', options: ['什麼考試', '什麼時候', '什麼人'], ans: 0, cite: '頁面 11：[語法] 「不管」後面常是一個問題。' },
        { type: 'choice', q: '____你會照相！我以前不知道。', options: ['反對', '原來', '用功'], ans: 1, cite: '頁面 4：[生詞] 原來你會照相。' },
        { type: 'choice', q: '我反對老師每天都____。', options: ['買衣服', '筆試/口試', '去海邊'], ans: 1, cite: '頁面 3：[生詞] 我反對老師每天都筆試/口試。' }
    ];

    let currentQ = 0, score = 0, attempts = 0, userSort = [];

    function replayQ() { speak(questions[currentQ].type === 'choice' ? questions[currentQ].q : '請將詞彙排列正確。'); }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(txt);
        m.lang = 'zh-TW';
        window.speechSynthesis.speak(m);
    }

    function initGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('progress-container').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ], interactive = document.getElementById('interactive-area'), fb = document.getElementById('feedback');
        attempts = 0; userSort = [];
        document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('attempt-hint').innerText = "💡 剩餘嘗試機會：2";
        interactive.innerHTML = ''; fb.className = 'hidden';
        document.getElementById('next-btn').classList.add('hidden');

        if(q.type === 'choice') {
            const grid = document.createElement('div'); grid.className = 'options-grid';
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = opt;
                b.onclick = () => checkAns(idx, b); grid.appendChild(b);
            });
            interactive.appendChild(grid);
        } else {
            const zone = document.createElement('div'); zone.className = 'sort-zone'; zone.id = 'sort-zone';
            interactive.appendChild(zone);
            const pool = document.createElement('div');
            [...q.words].sort(() => Math.random() - 0.5).forEach(w => {
                const t = document.createElement('div'); t.className = 'word-tile'; t.innerText = w;
                t.onclick = () => { userSort.push(w); updateSortDisplay(); }; pool.appendChild(t);
            });
            interactive.appendChild(pool);
            const cBtn = document.createElement('button'); cBtn.className = 'btn'; cBtn.style.marginTop = '20px'; cBtn.innerText = '✅ 確認排序';
            cBtn.onclick = checkSort; interactive.appendChild(cBtn);
        }
        replayQ();
    }

    function updateSortDisplay() {
        const zone = document.getElementById('sort-zone'); zone.innerHTML = '';
        userSort.forEach((w, i) => {
            const t = document.createElement('div'); t.className = 'word-tile';
            t.style.background = 'var(--edu-blue)'; t.style.color = 'white'; t.innerText = w;
            t.onclick = () => { userSort.splice(i,1); updateSortDisplay(); }; zone.appendChild(t);
        });
    }

    function checkAns(idx, btn) {
        const q = questions[currentQ], fb = document.getElementById('feedback');
        if(idx === q.ans) { handleSuccess(`答對了！你真用功。✨`); }
        else {
            attempts++; btn.disabled = true;
            if(attempts >= 2) handleFailure(`正確答案是：${q.options[q.ans]}`);
            else { fb.className = 'wrong'; fb.classList.remove('hidden'); fb.innerText = "答錯了，再給自己一次機會！(剩餘 1 次)"; document.getElementById('attempt-hint').innerText = "💡 剩餘嘗試機會：1"; }
        }
    }

    function checkSort() {
        const q = questions[currentQ];
        if(userSort.join('') === q.ans) handleSuccess(`句子組合正確！✅`);
        else {
            attempts++;
            if(attempts >= 2) handleFailure(`正確順序是：${q.ans}`);
            else { const fb = document.getElementById('feedback'); fb.className = 'wrong'; fb.classList.remove('hidden'); fb.innerText = "順序不對喔，再挑戰一次！(剩餘 1 次)"; document.getElementById('attempt-hint').innerText = "💡 剩餘嘗試機會：1"; }
        }
    }

    function handleSuccess(msg) {
        const q = questions[currentQ], fb = document.getElementById('feedback');
        fb.innerHTML = `${msg} <span class="cite-tag">📘 學習點：${q.cite}</span>`;
        fb.className = 'correct'; fb.classList.remove('hidden');
        score++; endStep();
    }

    function handleFailure(msg) {
        const q = questions[currentQ], fb = document.getElementById('feedback');
        fb.innerHTML = `可惜了！${msg} <span class="cite-tag">📘 學習點：${q.cite}</span>`;
        fb.className = 'wrong'; fb.classList.remove('hidden');
        endStep();
    }

    function endStep() {
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('attempt-hint').innerText = "✨ 本題挑戰結束";
        const btns = document.querySelectorAll('.btn'); btns.forEach(b => { if(b.id !== 'next-btn') b.disabled = true; });
    }

    function nextQuestion() {
        currentQ++; if(currentQ < questions.length) showQuestion(); else showEnd();
    }

    function showEnd() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('score-display').innerText = `${score} / ${questions.length}`;
        document.getElementById('final-stats').innerText = score >= 12 ? "你是華語小學霸！🏆" : "再練習一次，你一定會更棒！💪";
    }
</script>
</body>
</html>
